<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Termo de Retirada e Devolução</title>

<style>
    body {
        font-family: Arial, sans-serif;
        margin: 20px;
        background: #f5f5f5;
    }

    .container {
        max-width: 900px;
        margin: auto;
        background: #fff;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 0 8px rgba(0,0,0,0.15);
    }

    h1 {
        text-align: center;
        font-size: 22px;
        margin-bottom: 20px;
    }

    label {
        display: block;
        font-weight: bold;
        margin-top: 10px;
    }

    input, textarea {
        width: 100%;
        padding: 8px;
        box-sizing: border-box;
        margin-top: 4px;
        border: 1px solid #aaa;
        border-radius: 4px;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 15px;
    }

    th, td {
        border: 1px solid #999;
        padding: 5px;
    }

    th {
        background: #eee;
    }

    td input {
        border: none;
        padding: 6px;
    }

    textarea {
        min-height: 70px;
        resize: vertical;
    }

    .botoes {
        margin-top: 20px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
    }

    button {
        padding: 10px 15px;
        cursor: pointer;
        border: none;
        border-radius: 4px;
        background: #333;
        color: #fff;
        font-weight: bold;
    }

    button:hover {
        background: #000;
    }

    pre {
        background: #111;
        color: #0f0;
        padding: 15px;
        overflow-x: auto;
        font-family: "Courier New", monospace;
        font-size: 13px;
        margin-top: 20px;
        white-space: pre;
    }

</style>
</head>

<body>

<div class="container">
    <h1>Termo de Retirada e Devolução de Materiais / Ferramentas</h1>


    <label>Empresa</label>
    <input type="text" id="empresa">

    <label>Responsável</label>
    <input type="text" id="responsavel">

    <label>Obra</label>
    <input type="text" id="obra">

    <label>Data e hora da retirada</label>
    <input type="datetime-local" id="dataHoraRetirada">

    <h3>Materiais Retirados</h3>

    <table id="tabelaMateriais">
        <thead>
            <tr>
                <th style="width: 18%;">Código</th>
                <th>Descrição</th>
                <th style="width: 18%;">Qtd.</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td><input type="text" class="codigo"></td>
                <td><input type="text" class="descricao"></td>
                <td><input type="text" class="quantidade"></td>
            </tr>
        </tbody>
    </table>

    <label>Observação</label>
    <textarea id="observacaoDocumento"></textarea>

    <div class="botoes">
        <button onclick="adicionarLinha()">Adicionar Material</button>
        <button onclick="gerarTXT()">Gerar TXT</button>
        <button onclick="baixarTXT()">Baixar TXT</button>
        <button onclick="imprimirPrevia()">Imprimir Prévia</button>
    </div>

    <pre id="saida"></pre>
</div>

<script>
let ultimoTXT = "";

function repetir(char, qtd) {
    return new Array(qtd + 1).join(char);
}

function larguraAtual() {
    return 42;
}

function normalizarTexto(texto) {
    texto = String(texto || "");

    // Remove acentos para evitar caracteres estranhos em impressoras ESC/POS genéricas.
    if (texto.normalize) {
        texto = texto.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    }

    texto = texto
        .replace(/ç/g, "c")
        .replace(/Ç/g, "C")
        .replace(/[“”]/g, '"')
        .replace(/[‘’]/g, "'")
        .replace(/[–—]/g, "-");

    // Mantém apenas caracteres imprimíveis ASCII básicos.
    texto = texto.replace(/[^\x20-\x7E]/g, "");

    return texto;
}

function centralizar(texto, largura) {
    texto = normalizarTexto(texto);
    if (texto.length >= largura) {
        return texto.substring(0, largura);
    }

    let espacos = largura - texto.length;
    let esquerda = Math.floor(espacos / 2);
    let direita = espacos - esquerda;

    return repetir(" ", esquerda) + texto + repetir(" ", direita);
}

function cortar(texto, tamanho) {
    texto = normalizarTexto(texto);
    if (texto.length > tamanho) {
        return texto.substring(0, tamanho);
    }
    return texto;
}

function completarDireita(texto, tamanho) {
    texto = cortar(texto, tamanho);
    return texto + repetir(" ", tamanho - texto.length);
}

function completarEsquerda(texto, tamanho) {
    texto = cortar(texto, tamanho);
    return repetir(" ", tamanho - texto.length) + texto;
}

function quebrarTexto(texto, largura) {
    texto = normalizarTexto(texto).replace(/\s+/g, " ").trim();

    if (!texto) {
        return [""];
    }

    let linhas = [];
    let palavras = texto.split(" ");
    let linha = "";

    palavras.forEach(function(palavra) {
        while (palavra.length > largura) {
            if (linha) {
                linhas.push(linha);
                linha = "";
            }
            linhas.push(palavra.substring(0, largura));
            palavra = palavra.substring(largura);
        }

        if (!linha) {
            linha = palavra;
        } else if ((linha + " " + palavra).length <= largura) {
            linha += " " + palavra;
        } else {
            linhas.push(linha);
            linha = palavra;
        }
    });

    if (linha) {
        linhas.push(linha);
    }

    return linhas.length ? linhas : [""];
}

function montarBlocoTexto(txt, titulo, conteudo, largura) {
    conteudo = normalizarTexto(conteudo).trim();

    if (!conteudo) {
        return txt;
    }

    txt += repetir("-", largura) + "\n";
    txt += titulo + ":\n";

    quebrarTexto(conteudo, largura).forEach(function(linha) {
        txt += completarDireita(linha, largura) + "\n";
    });

    return txt;
}

function doisDigitos(valor) {
    return String(valor).padStart(2, "0");
}

function formatarDataHora(dataHora) {
    if (!dataHora) return "";

    let partes = dataHora.split("T");
    let data = partes[0] || "";
    let hora = partes[1] || "";

    let partesData = data.split("-");

    if (partesData.length !== 3) {
        return dataHora;
    }

    hora = hora.substring(0, 5);

    return partesData[2] + "/" + partesData[1] + "/" + partesData[0] + " " + hora;
}

function dataHoraAtualParaInput() {
    let agora = new Date();

    let ano = agora.getFullYear();
    let mes = doisDigitos(agora.getMonth() + 1);
    let dia = doisDigitos(agora.getDate());
    let hora = doisDigitos(agora.getHours());
    let minuto = doisDigitos(agora.getMinutes());

    return ano + "-" + mes + "-" + dia + "T" + hora + ":" + minuto;
}

function preencherDataHoraAtual() {
    let campo = document.getElementById("dataHoraRetirada");

    if (campo && !campo.value) {
        campo.value = dataHoraAtualParaInput();
    }
}

function adicionarLinha() {
    let tbody = document.querySelector("#tabelaMateriais tbody");
    let tr = document.createElement("tr");

    tr.innerHTML = `
        <td><input type="text" class="codigo"></td>
        <td><input type="text" class="descricao"></td>
        <td><input type="text" class="quantidade"></td>
    `;

    tbody.appendChild(tr);
}

function montarCabecalho(txt, largura) {
    txt += centralizar("TERMO DE RETIRADA", largura) + "\n";
    txt += centralizar("E DEVOLUCAO DE MATERIAIS", largura) + "\n";
    txt += repetir("-", largura) + "\n";
    return txt;
}

function montarDadosPrincipais(txt, largura) {
    let empresa = document.getElementById("empresa").value;
    let responsavel = document.getElementById("responsavel").value;
    let obra = document.getElementById("obra").value;
    let dataHoraRetirada = formatarDataHora(document.getElementById("dataHoraRetirada").value);

    let campo = largura - 9;

    txt += "Empresa: " + cortar(empresa, campo) + "\n";
    txt += "Resp.:   " + cortar(responsavel, campo) + "\n";
    txt += "Obra:    " + cortar(obra, campo) + "\n";

    txt += "Data/Hora: " + cortar(dataHoraRetirada, largura - 11) + "\n";

    return txt;
}

function montarTabela(txt, largura) {
    // Layout fixo para 42 colunas:
    // COD = 5, espaco = 1, DESCRICAO = 26, espaco = 1, QTD = 9
    // Quando descricao ou quantidade ultrapassarem o campo, o texto continua nas linhas seguintes.
    const COL_COD = 5;
    const COL_DESC = 26;
    const COL_QTD = 9;

    txt += repetir("-", largura) + "\n";
    txt += completarDireita("COD", COL_COD);
    txt += " ";
    txt += completarDireita("DESCRICAO", COL_DESC);
    txt += " ";
    txt += completarEsquerda("QTD", COL_QTD) + "\n";
    txt += repetir("-", largura) + "\n";

    document.querySelectorAll("#tabelaMateriais tbody tr").forEach(function(tr) {
        let codigo = tr.querySelector(".codigo").value;
        let descricao = tr.querySelector(".descricao").value;
        let quantidade = tr.querySelector(".quantidade").value;

        if (codigo.trim() || descricao.trim() || quantidade.trim()) {
            let codigos = quebrarTexto(codigo, COL_COD);
            let descricoes = quebrarTexto(descricao, COL_DESC);
            let quantidades = quebrarTexto(quantidade, COL_QTD);
            let totalLinhas = Math.max(codigos.length, descricoes.length, quantidades.length);

            for (let i = 0; i < totalLinhas; i++) {
                txt += completarDireita(codigos[i] || "", COL_COD);
                txt += " ";
                txt += completarDireita(descricoes[i] || "", COL_DESC);
                txt += " ";
                txt += completarEsquerda(quantidades[i] || "", COL_QTD);
                txt += "\n";
            }
        }
    });

    return txt;
}

function montarObservacaoDocumento(txt, largura) {
    let observacao = document.getElementById("observacaoDocumento").value;
    return montarBlocoTexto(txt, "Observacao", observacao, largura);
}

function montarRodape(txt, largura) {
    txt += repetir("-", largura) + "\n\n";
    txt += "Nome e sobrenome:\n\n";
    txt += repetir("_", largura) + "\n\n";
    txt += "Assinatura:\n\n";
    txt += repetir("_", largura) + "\n\n";
    txt += centralizar("BR EQUIPAMENTOS", largura) + "\n";
    return txt;
}


function gerarTXT() {
    const LARGURA = larguraAtual();
    let txt = "";

    txt = montarCabecalho(txt, LARGURA);
    txt = montarDadosPrincipais(txt, LARGURA);
    txt = montarTabela(txt, LARGURA);
    txt = montarObservacaoDocumento(txt, LARGURA);
    txt = montarRodape(txt, LARGURA);


    ultimoTXT = txt;
    document.getElementById("saida").textContent = txt;
    return txt;
}

function baixarTXT() {
    let txt = gerarTXT();

    let blob = new Blob([txt], {
        type: "text/plain;charset=us-ascii"
    });

    let link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "termo_retirada_gs_fj80h_ue_42col.txt";
    link.click();
    URL.revokeObjectURL(link.href);
}


function escaparHtml(texto) {
    return String(texto || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
}

function imprimirPrevia() {
    let txt = gerarTXT();
    let janela = window.open("", "_blank");

    janela.document.write(`
        <html>
        <head>
            <title>Impressao GS-FJ80H-UE</title>
            <style>
                body {
                    font-family: "Courier New", monospace;
                    font-size: 12px;
                    white-space: pre;
                    margin: 0;
                    padding: 0;
                    line-height: 1.15;
                }

                @media print {
                    @page {
                        size: 80mm auto;
                        margin: 3mm;
                    }

                    body {
                        width: 72mm;
                    }
                }
            </style>
        </head>
        <body>${escaparHtml(txt)}</body>
        </html>
    `);

    janela.document.close();
    janela.focus();
    janela.print();
}
window.addEventListener("load", preencherDataHoraAtual);
</script>

</body>
</html>
